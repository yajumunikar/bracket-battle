spring:
  application:
    name: bracket-battle
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/bracketbattle?sslmode=disable
    username: bracketbattle
    password: bracketbattle123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            scope: email, profile

server:
  port: 8080

jwt:
  secret: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
  access-token-expiry-ms: 86400000
  refresh-token-expiry-ms: 604800000

sendgrid:
  api-key: your-sendgrid-api-key
  from-email: noreply@thebracketbattle.com

aws:
  access-key-id: your-aws-access-key
  secret-access-key: your-aws-secret-key
  s3:
    bucket: bracketbattle-uploads
  region: us-east-1

frontend:
  url: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.bracketbattle: DEBUG
    org.springframework.security: INFO
